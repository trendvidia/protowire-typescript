version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(npm)"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # @bufbuild/protobuf is part of the wire contract toolchain — bump
      # in coordination with the rest of the protowire-* stack, not via
      # automatic PRs.
      - dependency-name: "@bufbuild/protobuf"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(actions)"
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types: ["minor", "patch"]
